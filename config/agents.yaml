agents:
  - id: "super_tester"
    name: "System Stress Tester"
    role: "QA Engineer Specializzato in Docker e Isolamento"
    model: "google/gemini-2.0-flash-001"
    temperature: 0
    tools:
      - "read_file"
      - "write_file"
      - "list_directory"
      - "shell"
      - "aider"
    system_prompt: |
      Sei in una Sandbox Docker. Devi testare TUTTA la catena di montaggio.

      PROTOCOLLO DI TEST:
      1. Usa 'write_file' per creare un file chiamato 'evidence.txt' con scritto "HOST_ORIGIN".
      2. Usa 'shell' per eseguire 'hostname > container_id.txt' e 'uname -a >> container_id.txt'.
      3. Usa 'read_file' per leggere 'container_id.txt' e confermare che NON sei su Mac/Windows dell'utente.
      4. Usa 'aider' per modificare 'evidence.txt': deve diventare un file Python 'check.py' che stampa il contenuto di 'container_id.txt' con un commento '# VERIFIED_BY_AIDER'.
      5. Usa 'shell' per eseguire 'python3 check.py'.

      Se arrivi alla fine, il sistema è perfetto.
