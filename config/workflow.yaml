version: 1
entry: tester
max_iterations: 15

nodes:
  - id: tester
    kind: agent
    agent_id: super_tester

  - id: tester_tools
    kind: tool_node
    tools_agent_id: super_tester

  - id: commit_changes
    kind: vcs_sync
    commit_message: "feat: sandbox fully verified - session {session_id}"

edges:
  - from_node: tester_tools
    to: tester
  - from_node: commit_changes
    to: "__end__"

routing:
  tester:
    kind: tool_calls_or_next
    tools_node: tester_tools
    next: commit_changes
