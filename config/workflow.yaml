version: 1
entry: analyst
max_iterations: 2 # Sufficienti per un'analisi conoscitiva
post_processing:
  - action: log
    params:
      message: "Analisi architettonica completata"
      level: INFO
  - action: echo_state
    params:
      keys: ["verdict", "iteration"]

nodes:
  - id: analyst
    kind: agent
    agent_id: analyst

  - id: analyst_tools
    kind: tool_node
    tools_agent_id: analyst

  - id: reviewer
    kind: agent
    agent_id: reviewer
    verdict:
      approved_marker: "APPROVED"
      approved_verdict: "approved"
      revision_verdict: "needs_revision"

  - id: reviewer_tools
    kind: tool_node
    tools_agent_id: reviewer

  - id: prepare_revision
    kind: state_update
    increment_iteration: true
    clear_verdict: true

edges:
  - from_node: analyst_tools
    to: analyst
  - from_node: reviewer_tools
    to: reviewer
  - from_node: prepare_revision
    to: analyst

routing:
  analyst:
    kind: tool_calls_or_next
    tools_node: analyst_tools
    next: reviewer
  reviewer:
    kind: reviewer_finish_or_tools_or_revision
    tools_node: reviewer_tools
    revision_node: prepare_revision
