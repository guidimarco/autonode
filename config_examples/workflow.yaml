# =============================================================================
# ESEMPIO / Master template — NON è la config operativa di default.
# Copia o adatta in workflow.yaml; richiede agenti coerenti in agents.yaml.
# =============================================================================
# Workflow V2: YAML seleziona solo la factory e i parametri; la topologia del
# grafo è definita in Python (es. application/workflow/factories/dev_review.py).
# =============================================================================

version: 2
factory: dev_review_loop
max_iterations: 10
token_budget: 500000
agents_path: config/agents.yaml
params:
  developer_agent_id: developer
  reviewer_agent_id: code_reviewer
  reviewer_structured: true
  commit_after_dev: true
