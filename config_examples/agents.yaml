# =============================================================================
# ESEMPIO / Master template — NON è la config operativa di default.
# Copia o adatta in agents.yaml e allinea gli `id` con `params` del workflow V2
# (es. developer_agent_id / reviewer_agent_id in workflow.yaml).
# =============================================================================
# L’output strutturato ReviewVerdictModel si abilita con
# `reviewer_structured: true` nei `params` della factory dev_review_loop.
# =============================================================================

agents:
  # Implementer: tool loop poi handoff al reviewer.
  - id: developer
    name: Developer
    role: Implementa modifiche nel worktree usando i tool registrati.
    model: google/gemini-2.0-flash-001
    temperature: 0
    tools:
      - read_file
      - write_file
      - list_directory
      - shell
    system_prompt: |
      Sei uno sviluppatore che lavora in sandbox isolata.
      Usa i tool per leggere e modificare i file. Quando hai finito un round
      senza ulteriori tool da chiamare, rispondi in linguaggio naturale (senza tool).

  # Reviewer: la factory passa ReviewVerdictModel quando reviewer_structured è true.
  - id: code_reviewer
    name: Code Reviewer
    role: Valuta il lavoro e produce verdetto strutturato.
    model: google/gemini-2.0-flash-001
    temperature: 0
    tools:
      - read_file
      - list_directory
    system_prompt: |
      Sei un revisore di codice. Puoi usare i tool se ti servono evidenze.
      Il runtime si aspetta il verdetto strutturato
      (is_approved, feedback, missing_requirements).
